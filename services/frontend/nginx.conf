server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Frontend SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to Service A — Data Ingestion
    location /api/assets {
        proxy_pass http://data-ingestion:8000;
        proxy_set_header Host $host;
    }
    location /api/candles {
        proxy_pass http://data-ingestion:8000;
        proxy_set_header Host $host;
    }
    location /api/quotes {
        proxy_pass http://data-ingestion:8000;
        proxy_set_header Host $host;
    }
    location /api/symbols {
        proxy_pass http://data-ingestion:8000;
        proxy_set_header Host $host;
    }
    location /api/data {
        proxy_pass http://data-ingestion:8000;
        proxy_set_header Host $host;
    }

    # Proxy to Service B — Quant Engine
    location /api/analyze {
        proxy_pass http://quant-engine:8001;
        proxy_set_header Host $host;
    }
    location /api/risk-profile {
        proxy_pass http://quant-engine:8001;
        proxy_set_header Host $host;
    }

    # Proxy to Service C — Portfolio Engine
    location /api/portfolio {
        proxy_pass http://portfolio-engine:8002;
        proxy_set_header Host $host;
    }
    location /api/trades {
        proxy_pass http://portfolio-engine:8002;
        proxy_set_header Host $host;
    }
    location /api/alerts {
        proxy_pass http://portfolio-engine:8002;
        proxy_set_header Host $host;
    }
    location /api/robinhood {
        proxy_pass http://portfolio-engine:8002;
        proxy_set_header Host $host;
    }
    location /api/process-signal {
        proxy_pass http://portfolio-engine:8002;
        proxy_set_header Host $host;
    }
    location /api/settings {
        proxy_pass http://portfolio-engine:8002;
        proxy_set_header Host $host;
    }

    # Proxy to Notification Gateway
    location /api/notify {
        proxy_pass http://notification-gateway:8003;
        proxy_set_header Host $host;
    }
}
